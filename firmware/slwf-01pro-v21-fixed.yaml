# ─────────────────────────────────────────────────────────────
#  SMARTLIGHT SLWF-01pro v2.1
#  Changes from stock:
#    - api: reboot_timeout: 0s  (stops random 15-min reboots)
#    - web_server: cors_allowed_origins: ["*"]  (allows dashboard POSTs)
# ─────────────────────────────────────────────────────────────

substitutions:
  name: "air-conditioner"
  friendly_name: "Air Conditioner"
  visual_min_temperature: "17 °C"
  visual_max_temperature: "30 °C"
  visual_temperature_step: "0.5 °C"
  midea_climate_autoconf: "true"
  midea_climate_beeper: "false"

##################################################
#YOU SHOULD NOT NEED TO EDIT BELOW THIS LINE     #
##################################################

  api_encryption_key: !secret air_conditioner_api_encryption_key
  ota_password: !secret air_conditioner_ota_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  wifi_ap_ssid: !secret air_conditioner_wifi_ap_ssid
  wifi_ap_password: !secret air_conditioner_wifi_ap_password

  factory_reset_button_name: "Factory reset"
  display_toggle_name: "Display Toggle"
  swing_step_name: "Swing Step"
  outdoor_temperature_name: "Outdoor Temperature"
  power_usage_name: "Power Usage"
  humidity_setpoint_name: "Indoor Humidity"
  beeper_switch_name: "Beeper"
  wifi_signal_sensor_name: "Wi-Fi Signal"
  uptime_sensor_name: "Uptime"
  uptime_days_sensor_name: "Uptime Days"
  uptime_days_unit_of_measurement: "days"

wifi:
  ssid: "${wifi_ssid}"
  password: "${wifi_password}"
  ap:
    ssid: "${wifi_ap_ssid}"
    password: "${wifi_ap_password}"

captive_portal:

logger:
  baud_rate: 0

api:
  reboot_timeout: 0s          # FIXED: prevents reboot when no HA connected
  encryption:
    key: "${api_encryption_key}"
  services:
    - service: follow_me
      variables:
        temperature: float
      then:
        midea_ac.follow_me:
          temperature: !lambda "return temperature;"
          beeper: false

ota:
  - platform: esphome
    password: "${ota_password}"

web_server:
  port: 80
  local: true
  cors_allowed_origins:       # FIXED: allows dashboard to send commands
    - "*"

uart:
  tx_pin: 12
  rx_pin: 14
  baud_rate: 9600

button:
  - platform: factory_reset
    id: factory_reset_btn
    name: "${factory_reset_button_name}"
  - platform: template
    name: "${display_toggle_name}"
    id: midea_display_toggle
    icon: mdi:theme-light-dark
    on_press:
      midea_ac.display_toggle:
  - platform: template
    name: "${swing_step_name}"
    id: midea_swing_step
    icon: mdi:tailwind
    on_press:
      midea_ac.swing_step:

climate:
  - platform: midea
    name: "${friendly_name}"
    id: midea_climate
    period: 1s
    timeout: 2s
    num_attempts: 3
    autoconf: "${midea_climate_autoconf}"
    beeper: "${midea_climate_beeper}"
    visual:
      min_temperature: "${visual_min_temperature}"
      max_temperature: "${visual_max_temperature}"
      temperature_step: "${visual_temperature_step}"
    supported_modes:
      - FAN_ONLY
      - HEAT_COOL
      - COOL
      - HEAT
      - DRY
    custom_fan_modes:
      - SILENT
      - TURBO
    supported_presets:
      - ECO
      - BOOST
      - SLEEP
    custom_presets:
      - FREEZE_PROTECTION
    supported_swing_modes:
      - VERTICAL
      - HORIZONTAL
      - BOTH

##################################################
#FEEL FREE TO EDIT BELOW THIS LINE               #
##################################################

    outdoor_temperature:
      name: "${outdoor_temperature_name}"
    power_usage:
      name: "${power_usage_name}"
  # humidity_setpoint:
  #   name: "${humidity_setpoint_name}"

##################################################
#BELOW THIS LINE IS NOTHING TO EDIT              #
##################################################

esphome:
  name: "${name}"
  friendly_name: "${friendly_name}"
  name_add_mac_suffix: true
  project:
    name: SMLIGHT.SLWF-01Pro
    version: "2.1"

esp8266:
  board: esp12e

switch:
  - platform: template
    name: "${beeper_switch_name}"
    id: midea_beeper
    icon: mdi:volume-source
    restore_mode: RESTORE_DEFAULT_OFF
    optimistic: true
    turn_on_action:
      midea_ac.beeper_on:
    turn_off_action:
      midea_ac.beeper_off:

remote_transmitter:
  pin: GPIO13
  carrier_duty_percent: 100%

sensor:
  - platform: wifi_signal
    name: "${wifi_signal_sensor_name}"
    update_interval: 60s
  - platform: uptime
    name: "${uptime_sensor_name}"
    id: uptime_sec
    internal: true
  - platform: template
    name: "${uptime_days_sensor_name}"
    lambda: |-
      return (id(uptime_sec).state/60)/60/24;
    icon: mdi:clock-start
    unit_of_measurement: "${uptime_days_unit_of_measurement}"
    update_interval: 60s

script:
  - id: on_button_click
    then:
      midea_ac.power_toggle:
