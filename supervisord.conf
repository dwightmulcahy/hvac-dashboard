[supervisord]
nodaemon=true
logfile=/tmp/supervisord.log
pidfile=/tmp/supervisord.pid
loglevel=info
user=root

[program:nginx]
command=nginx -g "daemon off;"
autostart=true
autorestart=true
stderr_logfile=/tmp/nginx-error.log
stdout_logfile=/tmp/nginx-access.log
priority=10

[program:api]
command=uvicorn api:app --host 127.0.0.1 --port 8081 --workers 1
directory=/app
autostart=true
autorestart=true
stderr_logfile=/tmp/api-error.log
stdout_logfile=/tmp/api-access.log
priority=20
